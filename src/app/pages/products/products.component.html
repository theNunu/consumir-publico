<div class="carrusel-main">
    <div class="paginate-arrow">
        <i (click)="prevPage()" class="fa-solid fa-circle-left fa-5x"></i>
    </div>
    <div class="rounded shadow-lg"
        style="display: flex; gap: 30px;  background-color: rgb(255, 255, 255); padding: 20px ;width: 1500px">
        <div *ngFor="let product of paginatedProducts">
            <div class="bg-white border p-4 text-center rounded" style="width: 340px; height: 430px">
                <div class="fs-5 fw-semibold text-primary font-weight-bold text-center">{{product.title}}</div>

                <img [src]="product.image" style="width: 150px; height: 150px" class="mt-4">

                <p>{{product.price}}</p>
                <button (click)="openProduct(product.id)">
                    Ver producto
                </button>

                <i (click)="openProduct(product.id)" class="fa-solid fa-eye fa-2x"></i>

                <!-- <a [routerLink]="['/products', product.id]">
                    Ver producto
                </a>

                <a [routerLink]="['/products', product.id]">
                    <i class="fa-solid fa-eye fa-4x"></i>
                </a> -->

            </div>


        </div>
    </div>

    <div class="paginate-arrow">
        <i (click)="nextPage()" class="fa-sharp fa-solid fa-circle-right fa-5x"></i>
    </div>
</div>
