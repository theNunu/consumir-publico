<div
    style=" background-color: rgba(0, 0, 0, 0.587);   position: absolute;top: 0;left: 0;width: 100%;height: 100%;   display: flex;justify-content: center;align-items: center; ">
    <div class="bg-white text-center rounded" style="width:500px ;padding: 20px">
        <div *ngIf="product">

            <h2>{{product.title}}</h2>

            <img [src]="product.image" class="mt-3" style="width:200px; height:200px">
            <div class="border p-4 rounded mt-3">
                     <div class="text-secondary">{{product.description}}</div>

            </div>
       

            <p>Precio: {{product.price}}</p>

            <a routerLink="/products">
                Volver
            </a>

        </div>
    </div>

</div>
